version: 2

project_name: docsgraph

before:
  hooks:
    - go mod tidy

builds:
  - id: docsgraph
    main: .
    binary: docsgraph
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: docsgraph
    builds: [docsgraph]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - config.example.yaml
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: RandomCodeSpace
    name: docsgraphcontext
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
